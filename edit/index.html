<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Biblioteca de ROMs</title>
<style>
body {font-family:'Segoe UI'; background:#0f172a; color:white; margin:0;}
header {text-align:center; padding:20px; background:#020617; font-size:30px;}

.topbar {display:flex; gap:10px; padding:15px; justify-content:center;}
.topbar button, .upload {
  background:#1e293b; color:white; border:none;
  padding:10px 15px; border-radius:10px; cursor:pointer;
}
.upload input {display:none;}

.section {margin:30px 0;}
.section-title {font-size:22px; margin:20px; border-bottom:2px solid #444; display:flex; align-items:center; gap:10px;}
.section-title img{width:24px;height:24px;}

.row {display:flex; overflow-x:auto; padding:20px; gap:15px;}

.card {
  position:relative;
  width:220px; height:220px; background:#1e293b;
  border-radius:15px; padding:10px;
  display:flex; flex-direction:column; align-items:center; justify-content:space-between;
  cursor:pointer;
  transition: transform .2s ease, box-shadow .2s ease;
}
.card:hover{
  transform:scale(1.08);
  box-shadow:0 10px 25px rgba(0,0,0,.5);
  z-index:5;
}

.card-actions {
  position:absolute; top:8px; right:8px;
  display:flex; gap:5px; opacity:0;
}
.card:hover .card-actions {opacity:1;}

.icon-btn {
  width:28px; height:28px;
  border:none; border-radius:8px;
  cursor:pointer;
  background:rgba(0,0,0,0.4);
}

.logo-box {height:90px; display:flex; align-items:center; justify-content:center;}
.logo-box img {max-width:100%; max-height:100%; object-fit:contain;}

.modal {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none; align-items:center; justify-content:center;
}

.modal-box {
  background:linear-gradient(145deg,#1e293b,#0f172a);
  padding:25px;
  border-radius:20px;
  width:320px;
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
}

.modal-logo {width:70px;height:70px;}

.modal-box input, .modal-box select {
  width:100%;
  background:#020617;
  color:white;
  border:1px solid #334155;
  padding:10px;
  border-radius:10px;
}

.links-container {width:100%; display:flex; flex-direction:column; gap:6px;}

.add-link-btn {
  width:100%;
  background:#334155;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.modal-buttons {display:flex; gap:10px; width:100%;}
.btn-primary {flex:1;background:#0ea5e9;border:none;padding:10px;border-radius:10px;color:white;}
.btn-secondary {flex:1;background:#334155;border:none;padding:10px;border-radius:10px;color:white;}

/* popup */
#popupLinks{width:100%;display:flex;flex-direction:column;gap:10px;}
.link-btn{
  width:100%;
  background:linear-gradient(145deg,#1e293b,#0f172a);
  color:white;border:none;padding:12px;border-radius:10px;cursor:pointer;transition:.2s;
}
.link-btn:hover{background:#334155;transform:scale(1.05);}
</style>
</head>

<body>

<header>🎮 Biblioteca de ROMs</header>

<div class="topbar">
  <button onclick="openModal()">➕ Añadir</button>
  <button onclick="saveJSON()">💾 Guardar</button>
  <label class="upload">📂 Cargar<input type="file" onchange="loadJSON(event)"></label>
</div>

<div id="app"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <img src="img/default.png" class="modal-logo">
    <h2 id="modalTitle">Añadir consola</h2>

    <select id="category"></select>
    <input id="newCategory" placeholder="Nueva categoría">
    <input id="name" placeholder="Nombre de la consola">

    <div class="links-container" id="linksContainer"></div>
    <button class="add-link-btn" onclick="addLinkField()">➕ Añadir enlace</button>

    <div class="modal-buttons">
      <button class="btn-primary" onclick="saveItem()">Guardar</button>
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- POPUP LINKS -->
<div id="linksPopup" class="modal">
  <div class="modal-box">
    <img id="popupLogo" src="img/default.png" class="modal-logo">
    <h2 id="popupTitle">Selecciona enlace</h2>
    <div id="popupLinks"></div>
    <button class="btn-secondary" onclick="closeLinksPopup()">Cerrar</button>
  </div>
</div>

<script>
let data = {};
let draggedItem = null;
let editTarget = null;

function loadJSON(e){
  const r = new FileReader();
  r.onload = ev => { data = JSON.parse(ev.target.result); render(); };
  r.readAsText(e.target.files[0]);
}

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  Object.keys(data).forEach(section=>{
    if(!data[section].length) return;

    let html = `<div class="section">
    <div class="section-title">
      <img src="img/${section}.png" onerror="this.src='img/default.png'">
      ${section}
    </div>
    <div class="row">`;

    data[section].forEach(item=>{
      html += `
      <div class="card"
        draggable="true"
        ondragstart="dragStart(event)"
        ondragover="dragOver(event)"
        ondrop="dropItem(event)"
        data-section="${section}"
        data-name="${item.name}"
        onclick="handleClick('${section}','${item.name}')">

        <div class="card-actions">
          <button class="icon-btn" onclick="event.stopPropagation();openModal('${section}','${item.name}')">✏️</button>
          <button class="icon-btn" onclick="event.stopPropagation();deleteItem('${section}','${item.name}')">🗑️</button>
        </div>

        <div class="logo-box">
          <img src="${item.img}" onerror="this.src='img/default.png'">
        </div>

        <h3>${item.name}</h3>
      </div>`;
    });

    html += `</div></div>`;
    app.innerHTML += html;
  });
}

function handleClick(section,name){
  const item = data[section].find(i=>i.name===name);
  const links = item.links || (item.url ? [item.url] : []);

  if(links.length > 1){
    document.getElementById("popupTitle").textContent = name;
    document.getElementById("popupLogo").src = item.img;

    const container = document.getElementById("popupLinks");
    container.innerHTML = "";

    links.forEach(link=>{
      const btn = document.createElement("button");
      btn.className = "link-btn";

      let label = link;
      try {
        const u = new URL(link);
        label = u.hostname.replace("www.","").split(".")[0];
      } catch {}

      btn.textContent = "🌐 " + label;
      btn.onclick = ()=>window.open(link,"_blank");
      container.appendChild(btn);
    });

    document.getElementById("linksPopup").style.display = "flex";

  } else if(links.length === 1){
    window.open(links[0],"_blank");
  }
}

function closeLinksPopup(){
  document.getElementById("linksPopup").style.display = "none";
}

function dragStart(e){
  draggedItem = {section:e.currentTarget.dataset.section,name:e.currentTarget.dataset.name};
}
function dragOver(e){ e.preventDefault(); }
function dropItem(e){
  e.preventDefault();
  const targetSection=e.currentTarget.dataset.section;
  const targetName=e.currentTarget.dataset.name;
  if(!draggedItem||draggedItem.section!==targetSection) return;
  const list=data[targetSection];
  const from=list.findIndex(i=>i.name===draggedItem.name);
  const to=list.findIndex(i=>i.name===targetName);
  const [moved]=list.splice(from,1);
  list.splice(to,0,moved);
  render();
}

function openModal(section=null,name=null){
  document.getElementById("modal").style.display="flex";
  const title=document.getElementById("modalTitle");
  const select=document.getElementById("category");
  const newCat=document.getElementById("newCategory");

  select.innerHTML="";
  Object.keys(data).forEach(c=>select.innerHTML+=`<option>${c}</option>`);

  const container = document.getElementById("linksContainer");
  container.innerHTML="";

  if(name){
    const item=data[section].find(i=>i.name===name);
    title.textContent="Editar consola";
    select.value=section;
    document.getElementById("name").value=item.name;

    if(item.links && item.links.length){
      item.links.forEach(l=>addLinkField(l));
    } else if(item.url){
      addLinkField(item.url);
    } else {
      addLinkField();
    }

    newCat.style.display="none";
    editTarget={section,name};
  } else {
    title.textContent="Añadir consola";
    document.getElementById("name").value="";
    addLinkField();
    newCat.style.display="block";
    editTarget=null;
  }
}

function addLinkField(val=""){
  const c=document.getElementById("linksContainer");
  const d=document.createElement("div");
  d.style.display="flex"; d.style.gap="5px";
  d.innerHTML=`<input placeholder="URL" value="${val}">
               <button onclick="this.parentElement.remove()">❌</button>`;
  c.appendChild(d);
}

function closeModal(){document.getElementById("modal").style.display="none";}

function saveItem(){
  let section=document.getElementById("category").value;
  const newCat=document.getElementById("newCategory").value;
  if(!editTarget && newCat){section=newCat;}

  const name=document.getElementById("name").value;

  const links=[];
  document.querySelectorAll("#linksContainer input").forEach(i=>{
    if(i.value) links.push(i.value);
  });

  if(!data[section]) data[section]=[];

  if(editTarget){
    const item=data[editTarget.section].find(i=>i.name===editTarget.name);
    item.name=name;
    item.links=links;
    item.img="img/"+name+".png";
  }else{
    data[section].push({name,links,img:"img/"+name+".png"});
  }

  closeModal();
  render();
}

function deleteItem(section,name){
  data[section]=data[section].filter(i=>i.name!==name);
  render();
}

function saveJSON(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="consolas.json";
  a.click();
}
</script>

</body>
</html>
