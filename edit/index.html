<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ROMDOCK Editor</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/686/686589.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body {font-family:'Segoe UI'; background:#0f172a; color:white; margin:0;}
.header-wrapper{position:relative;height:130px;overflow:hidden;}
.banner{position:absolute;width:100%;height:100%;background:url("../img/banner.png") center/cover no-repeat;filter:brightness(0.5);} 
.main-title{position:relative;text-align:center;padding-top:30px;font-size:52px;font-weight:800;letter-spacing:3px;font-family:'Orbitron';}

.topbar{display:flex;gap:10px;padding:15px;justify-content:center;}
.topbar button, .upload{
  background:#1e293b;color:white;border:none;
  padding:12px 18px;border-radius:12px;cursor:pointer;
  font-family:'Orbitron';
}
.upload input{display:none;}

.section{margin:10px 0;border-top:1px solid #334155;padding-top:10px;}
.section-title{margin:20px;display:flex;align-items:center;gap:10px;font-family:'Orbitron';font-size:24px;}
.section-title img{width:28px;}

.row{display:flex;gap:15px;padding:20px;flex-wrap:wrap;}

.card{
  width:220px;height:220px;background:#1e293b;border-radius:15px;padding:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  cursor:pointer;transition:0.2s;position:relative;
}
.card:hover{transform:scale(1.08);}

.card-actions{
  position:absolute;top:8px;right:8px;display:flex;gap:5px;opacity:0;
}
.card:hover .card-actions{opacity:1;}

.icon-btn{
  width:28px;height:28px;border:none;border-radius:8px;
  background:rgba(0,0,0,0.4);color:white;cursor:pointer;
}

.logo-box{height:90px;display:flex;align-items:center;justify-content:center;}
.logo-box img{max-width:100%;max-height:100%;}

.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.75);
  display:none;align-items:center;justify-content:center;
}

.modal-box{
  background:linear-gradient(145deg,#1e293b,#020617);
  padding:30px;border-radius:20px;width:420px;
  display:flex;flex-direction:column;gap:10px;align-items:center;
}

.modal-logo{width:100px;}

.modal-box input, .modal-box select{
  width:100%;background:#020617;color:white;
  border:1px solid #334155;padding:12px;border-radius:12px;
}

.links-container{width:100%;display:flex;flex-direction:column;gap:6px;}

.add-link-btn{
  width:100%;background:#334155;border:none;
  padding:10px;border-radius:10px;cursor:pointer;
}

.modal-buttons{display:flex;gap:10px;width:100%;}
.btn-primary{flex:1;background:#0ea5e9;border:none;padding:12px;border-radius:10px;color:white;}
.btn-secondary{flex:1;background:#334155;border:none;padding:12px;border-radius:10px;color:white;}

.footer{text-align:center;padding:20px;font-size:12px;color:#64748b;}
</style>
</head>

<body>

<div class="header-wrapper">
  <div class="banner"></div>
  <div class="main-title">ROMDOCK EDITOR</div>
</div>

<div class="topbar">
  <button onclick="openModal()">➕ Añadir</button>
  <button onclick="saveJSON()">💾 Guardar</button>
  <label class="upload">📂 Cargar<input type="file" onchange="loadJSON(event)"></label>
</div>

<div id="app"></div>

<div class="modal" id="modal">
  <div class="modal-box">
    <img src="../img/default.png" class="modal-logo">
    <h2 id="modalTitle">Añadir consola</h2>

    <select id="category"></select>
    <input id="newCategory" placeholder="Nueva categoría">
    <input id="name" placeholder="Nombre de la consola">

    <div class="links-container" id="linksContainer"></div>
    <button class="add-link-btn" onclick="addLinkField()">➕ Añadir enlace</button>

    <div class="modal-buttons">
      <button class="btn-primary" onclick="saveItem()">Guardar</button>
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="footer">Editor ROMDOCK</div>

<script>
let data = {};
let draggedItem = null;
let editTarget = null;

// AUTO LOAD
fetch("../data.json",{cache:"no-store"})
.then(r=>r.json())
.then(j=>{data=j; render();})
.catch(()=>{});

// MANUAL LOAD
function loadJSON(e){
  const r = new FileReader();
  r.onload = ev => { data = JSON.parse(ev.target.result); render(); };
  r.readAsText(e.target.files[0]);
}

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  Object.keys(data).forEach(section=>{
    let html = `<div class="section">
      <div class="section-title">
        <img src="../img/${section}.png" onerror="this.src='../img/default.png'">
        ${section}
      </div>
      <div class="row">`;

    data[section].forEach(item=>{
      html += `<div class="card"
        draggable="true"
        ondragstart="dragStart(event)"
        ondragover="dragOver(event)"
        ondrop="dropItem(event)"
        data-section="${section}"
        data-name="${item.name}"
        onclick='handleClick(${JSON.stringify(section)}, ${JSON.stringify(item.name)})'>

        <div class="card-actions">
          <button class="icon-btn" onclick='event.stopPropagation();openModal(${JSON.stringify(section)}, ${JSON.stringify(item.name)})'>✏️</button>
          <button class="icon-btn" onclick='event.stopPropagation();deleteItem(${JSON.stringify(section)}, ${JSON.stringify(item.name)})'>🗑️</button>
        </div>

        <div class="logo-box">
          <img src="../${encodeURI(item.img)}" onerror="this.src='../img/default.png'">
        </div>

        <h3>${item.name}</h3>
      </div>`;
    });

    html += `</div></div>`;
    app.innerHTML += html;
  });
}

function dragStart(e){
  draggedItem = {section:e.currentTarget.dataset.section,name:e.currentTarget.dataset.name};
}
function dragOver(e){ e.preventDefault(); }

function dropItem(e){
  e.preventDefault();

  const targetSection = e.currentTarget.dataset.section;
  const targetName = e.currentTarget.dataset.name;

  if(!draggedItem) return;

  const sourceSection = draggedItem.section;

  if(sourceSection === targetSection){
    const list = data[targetSection];
    const from = list.findIndex(i=>i.name===draggedItem.name);
    const to = list.findIndex(i=>i.name===targetName);

    const [moved] = list.splice(from,1);
    list.splice(to,0,moved);
  } else {
    const sourceList = data[sourceSection];
    const targetList = data[targetSection];

    const from = sourceList.findIndex(i=>i.name===draggedItem.name);
    const to = targetList.findIndex(i=>i.name===targetName);

    const [moved] = sourceList.splice(from,1);
    targetList.splice(to,0,moved);

    draggedItem.section = targetSection;
  }

  render();
}

function openModal(section=null,name=null){
  document.getElementById("modal").style.display="flex";
  const select=document.getElementById("category");
  select.innerHTML="";
  Object.keys(data).forEach(c=>select.innerHTML+=`<option>${c}</option>`);

  const container=document.getElementById("linksContainer");
  container.innerHTML="";

  if(name){
    const item=data[section].find(i=>i.name===name);
    document.getElementById("name").value=item.name;
    select.value=section;
    (item.links||[item.url]).forEach(l=>addLinkField(l));
    editTarget={section,name};
  } else {
    document.getElementById("name").value="";
    addLinkField();
    editTarget=null;
  }
}

function addLinkField(val=""){
  const c=document.getElementById("linksContainer");
  const d=document.createElement("div");
  d.style.display="flex"; d.style.gap="5px";
  d.innerHTML=`<input placeholder="URL" value="${val}">
               <button onclick="this.parentElement.remove()">❌</button>`;
  c.appendChild(d);
}

function closeModal(){document.getElementById("modal").style.display="none";}

function saveItem(){
  let section=document.getElementById("category").value;
  const newCat=document.getElementById("newCategory").value;
  if(!editTarget && newCat){section=newCat;}

  const name=document.getElementById("name").value;

  const links=[];
  document.querySelectorAll("#linksContainer input").forEach(i=>{
    if(i.value) links.push(i.value);
  });

  if(!data[section]) data[section]=[];

  if(editTarget){
    const oldSection = editTarget.section;
    const index = data[oldSection].findIndex(i=>i.name===editTarget.name);
    const item = data[oldSection][index];

    item.name=name;
    item.links=links;
    item.img="img/"+name+".png";

    if(oldSection !== section){
      data[oldSection].splice(index,1);
      data[section].push(item);
    }
  }else{
    data[section].push({name,links,img:"img/"+name+".png"});
  }

  closeModal();
  render();
}

function deleteItem(section,name){
  data[section]=data[section].filter(i=>i.name!==name);
  render();
}

function saveJSON(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.json";
  a.click();
}
</script>

</body>
</html>
