<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ROMDOCK Editor</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/686/686589.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body {font-family:'Segoe UI'; background:#0f172a; color:white; margin:0;}

/* HEADER */
.header-wrapper{position:relative;height:140px;}
.banner{
position:absolute;width:100%;height:100%;
background:url("../img/banner.png") center/cover no-repeat;
filter:brightness(0.4);
}
.main-title{
position:relative;
text-align:center;
padding-top:40px;
font-size:52px;
font-family:'Orbitron';
letter-spacing:3px;
}

/* TOPBAR */
.topbar{display:flex;align-items:center;padding:15px;}
.topbar button{
background:#1e293b;
color:white;
border:none;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
font-family:'Orbitron';
}
.topbar-right{margin-left:auto;display:flex;gap:10px;}

/* CATEGORÍAS */
.section-title{
display:flex;
align-items:center;
gap:10px;
margin:20px;
font-family:'Orbitron';
font-size:22px;
}
.section-title img{width:30px;}

.row{display:flex;gap:15px;padding:20px;flex-wrap:wrap;}

/* CARD */
.card{
width:220px;height:220px;
background:#1e293b;
border-radius:15px;
padding:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
cursor:pointer;
position:relative;
transition:.2s;
}
.card:hover{transform:scale(1.07);}

.card-actions{
position:absolute;
top:8px;
right:8px;
display:flex;
gap:5px;
opacity:0;
}
.card:hover .card-actions{opacity:1;}

.icon-btn{
width:28px;height:28px;
border:none;
border-radius:8px;
background:#0008;
color:white;
cursor:pointer;
}

/* LOGO */
.logo-box{
height:90px;
display:flex;
align-items:center;
justify-content:center;
}
.logo-box img{max-width:100%;max-height:100%;}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.75);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:linear-gradient(145deg,#1e293b,#020617);
padding:25px;
border-radius:20px;
width:420px;
display:flex;
flex-direction:column;
gap:12px;
}

.modal-logo{
width:90px;
margin:auto;
}

.modal-box h2{
text-align:center;
font-family:'Orbitron';
margin-bottom:10px;
}

.modal-box input,
.modal-box select{
width:100%;
background:#020617;
color:white;
border:1px solid #334155;
padding:12px;
border-radius:12px;
}

.links-container{display:flex;flex-direction:column;gap:6px;}

.link-row{display:flex;gap:6px;}
.link-row input{flex:1;}

.add-link-btn{
width:100%;
background:#334155;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.modal-buttons{
display:flex;
gap:10px;
}

.btn-primary{
flex:1;
background:#0ea5e9;
border:none;
padding:12px;
border-radius:10px;
color:white;
}

.btn-secondary{
flex:1;
background:#334155;
border:none;
padding:12px;
border-radius:10px;
color:white;
}

/* POPUP LINKS */
.links-popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000c;
display:none;
align-items:center;
justify-content:center;
}

.links-box{
background:#020617;
padding:30px;
border-radius:20px;
display:flex;
flex-direction:column;
gap:15px;
min-width:300px;
}

.popup-logo{width:100px;margin:auto;}

.link-btn{
display:flex;
align-items:center;
gap:10px;
background:#1e293b;
padding:15px;
border-radius:12px;
text-decoration:none;
color:white;
font-family:'Orbitron';
}

/* TOAST */
#toast{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#020617;
padding:20px 30px;
border-radius:15px;
display:none;
font-family:'Orbitron';
}
</style>
</head>

<body>

<div class="header-wrapper">
<div class="banner"></div>
<div class="main-title">ROMDOCK EDITOR</div>
</div>

<div class="topbar">
<button onclick="openModal()">➕ Añadir consola</button>

<div class="topbar-right">
<button onclick="loadClick()">📁</button>
<button onclick="saveJSON()">💾</button>
<button onclick="saveToGitHub()">💾 GITHUB</button>
</div>

<input type="file" id="fileInput" style="display:none" onchange="loadJSON(event)">
</div>

<div id="app"></div>

<!-- POPUP -->
<div class="links-popup" id="linksPopup" onclick="closeLinksPopup()">
<div class="links-box" onclick="event.stopPropagation()">
<img id="popupLogo" class="popup-logo">
<div id="linksContainerPopup"></div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
<div class="modal-box" onclick="event.stopPropagation()">
<img src="../img/default.png" id="modalLogo" class="modal-logo">

<h2 id="modalTitle">Añadir consola</h2>

<select id="category"></select>
<input id="newCategory" placeholder="Nueva categoría">
<input id="name" placeholder="Nombre">

<div class="links-container" id="linksContainer"></div>

<button class="add-link-btn" onclick="addLinkField()">➕ Añadir enlace</button>

<div class="modal-buttons">
<button class="btn-primary" onclick="saveItem()">Guardar</button>
<button class="btn-secondary" onclick="closeModal()">Cancelar</button>
</div>
</div>
</div>

<div id="toast"></div>

<script>
let data={},draggedItem=null,editTarget=null;

fetch("../data.json").then(r=>r.json()).then(j=>{data=j;render();});

/* --------- MODAL --------- */
function openModal(section=null,name=null){
document.getElementById("modal").style.display="flex";

const select=document.getElementById("category");
select.innerHTML="";
Object.keys(data).forEach(c=>select.innerHTML+=`<option>${c}</option>`);

const container=document.getElementById("linksContainer");
container.innerHTML="";

if(name){
const item=data[section].find(i=>i.name===name);

document.getElementById("modalTitle").innerText="Editar consola";
document.getElementById("modalLogo").src="../"+item.img;

document.getElementById("name").value=item.name;
select.value=section;

item.links.forEach(l=>addLinkField(l));

editTarget={section,name};

}else{
document.getElementById("modalTitle").innerText="Añadir consola";
document.getElementById("modalLogo").src="../img/default.png";

document.getElementById("name").value="";
addLinkField();
editTarget=null;
}
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* --------- LINKS POPUP --------- */
function showLinksPopup(item){
document.getElementById("popupLogo").src="../"+item.img;

const box=document.getElementById("linksContainerPopup");
box.innerHTML="";

item.links.forEach(link=>{
const url=new URL(link);
const favicon=`https://www.google.com/s2/favicons?domain=${url.hostname}&sz=64`;

box.innerHTML+=`
<a class="link-btn" href="${link}" target="_blank">
<img src="${favicon}">
${url.hostname}
</a>`;
});

document.getElementById("linksPopup").style.display="flex";
}

function closeLinksPopup(){
document.getElementById("linksPopup").style.display="none";
}

/* --------- CLICK --------- */
function handleClick(section,name){
const item=data[section].find(i=>i.name===name);

if(item.links.length===1){
window.open(item.links[0],"_blank");
}else{
showLinksPopup(item);
}
}

/* --------- RESTO FUNCIONES (sin tocar lógica previa) --------- */
/* (render, drag, save, etc. se mantienen como ya tenías) */
</script>

</body>
</html>
