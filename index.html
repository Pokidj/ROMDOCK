<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ROMDOCK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body {font-family:'Segoe UI'; background:#0f172a; color:white; margin:0;}

.main-title{
  text-align:center;
  padding:25px;
  background:#020617;
  font-size:42px;
  font-weight:800;
  letter-spacing:2px;
  font-family:'Orbitron', sans-serif;
}

/* BANNER */
.banner{
  width:100%;
  height:240px;
  background:url("img/banner.png") center/cover no-repeat;
  position:relative;
}

.banner::after{
  content:"";
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background:linear-gradient(
    to bottom,
    rgba(2,6,23,0.8),
    rgba(2,6,23,0.6),
    rgba(2,6,23,0.9)
  );
}

/* SEARCH */
.search-container{display:flex; justify-content:flex-start; padding:20px 30px;}
#searchInput{
  width:400px;
  padding:14px;
  border-radius:14px;
  border:1px solid #334155;
  background:#020617;
  color:white;
  font-size:16px;
}

/* CATEGORY */
.section{
  margin:30px 0;
  border-top:1px solid #334155;
  padding-top:10px;
}

.section-title{
  margin:20px;
  display:flex;
  align-items:center;
  gap:10px;
  font-family:'Orbitron';
  font-size:26px;
}

.section-title img{
  width:30px;
}

/* GRID */
.row{display:flex; gap:15px; padding:20px;}

.card{
  width:220px; height:220px;
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:space-between;
  cursor:pointer;
  transition:0.2s;
}

.card.active{
  outline:2px solid #38bdf8;
  transform:scale(1.1);
}

.card:hover{
  transform:scale(1.08);
}

/* glow por marca */
.card[data-cat="PlayStation"]:hover{box-shadow:0 0 15px #3b82f6;}
.card[data-cat="Nintendo"]:hover{box-shadow:0 0 15px #ef4444;}
.card[data-cat="Xbox"]:hover{box-shadow:0 0 15px #22c55e;}

.logo-box{height:90px; display:flex; align-items:center; justify-content:center;}
.logo-box img{max-width:100%; max-height:100%;}

/* POPUP */
.modal{
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none; align-items:center; justify-content:center;
}

.modal-box{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  width:320px;
  animation:zoomIn .25s;
}

@keyframes zoomIn{
  from{transform:scale(.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.link-btn{
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:white;
  cursor:pointer;
}

.btn-close{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#475569;
  color:white;
}

.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#64748b;
}
</style>
</head>

<body>

<header class="main-title">ROMDOCK</header>
<div class="banner"></div>

<div class="search-container">
<input id="searchInput" placeholder="🔍 Buscar..." oninput="filter()">
</div>

<div id="app"></div>

<div id="popup" class="modal">
  <div class="modal-box">
    <h2 id="popupTitle"></h2>
    <div id="popupLinks"></div>
    <button class="btn-close" onclick="closePopup()">Cerrar</button>
  </div>
</div>

<div class="footer">© pokidj</div>

<script>

let data = {};
let cards = [];
let currentIndex = 0;

fetch("data.json").then(r=>r.json()).then(j=>{
  data=j;
  render();
});

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  cards=[];

  Object.keys(data).forEach(section=>{
    let html = `<div class="section">
      <div class="section-title">
        <img src="img/${section}.png" onerror="this.src='img/default.png'">
        ${section}
      </div>
      <div class="row">`;

    data[section].forEach(item=>{
      html+=`<div class="card" data-cat="${section}" onclick="openLinks('${section}','${item.name}')">
        <div class="logo-box">
          <img src="${item.img}" onerror="this.src='img/default.png'">
        </div>
        <h3>${item.name}</h3>
      </div>`;
    });

    html+="</div></div>";
    app.innerHTML+=html;
  });

  cards=[...document.querySelectorAll(".card")];
  setActive(0);
}

function setActive(i){
  if(i<0||i>=cards.length) return;
  cards.forEach(c=>c.classList.remove("active"));
  cards[i].classList.add("active");
  currentIndex=i;
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") setActive(currentIndex+1);
  if(e.key==="ArrowLeft") setActive(currentIndex-1);
  if(e.key==="ArrowDown") setActive(currentIndex+4);
  if(e.key==="ArrowUp") setActive(currentIndex-4);
  if(e.key==="Enter") cards[currentIndex]?.click();
  if(e.key==="Escape") closePopup();
});

function openLinks(section,name){
  const item=data[section].find(i=>i.name===name);
  const links=item.links||[item.url];

  if(links.length===1){
    window.open(links[0]);
    return;
  }

  const box=document.getElementById("popupLinks");
  box.innerHTML="";
  document.getElementById("popupTitle").textContent=name;

  links.forEach(l=>{
    const b=document.createElement("button");
    b.className="link-btn";
    b.textContent=l;
    b.onclick=()=>window.open(l);
    box.appendChild(b);
  });

  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function filter(){
  const val=document.getElementById("searchInput").value.toLowerCase();
  cards.forEach(c=>{
    const t=c.innerText.toLowerCase();
    c.style.display=t.includes(val)?"flex":"none";
  });
}

</script>

</body>
</html>
