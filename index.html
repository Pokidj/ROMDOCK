<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ROMDOCK</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/686/686589.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {font-family:'Segoe UI'; background:#0f172a; color:white; margin:0;}

/* HEADER */
.header-wrapper{
  position:relative;
  height:140px;
  overflow:hidden;
}
.banner{
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background:url("img/banner.png") center/cover no-repeat;
  filter:brightness(0.4);
}
.main-title{
  position:relative;
  text-align:center;
  padding-top:40px;
  font-size:52px;
  font-family:'Orbitron';
  letter-spacing:3px;
}

/* TOPBAR */
.topbar{display:flex;align-items:center;padding:15px;}
.topbar button{background:#1e293b;color:white;border:none;padding:10px 16px;border-radius:12px;cursor:pointer;font-family:'Orbitron';}
.topbar-right{margin-left:auto;display:flex;gap:10px;}

/* SEARCH */
.search-container{display:flex;justify-content:flex-start;padding:20px 30px;}
#searchInput{width:420px;padding:14px;border-radius:14px;border:1px solid #334155;background:#020617;color:white;font-size:16px;}

/* SECCIONES */
.section{border-top:1px solid #334155;margin-top:20px;padding-top:10px;}
.section-title{display:flex;align-items:center;gap:10px;margin:20px;font-family:'Orbitron';font-size:22px;}
.section-title img{width:30px;}

.row{display:flex;gap:15px;padding:20px;flex-wrap:wrap;}

/* CARD */
.card{
  width:220px;height:220px;background:#1e293b;border-radius:15px;padding:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  cursor:pointer;position:relative;transition:.2s;
}
.card:hover{transform:scale(1.07);}
.card.active{outline:2px solid #38bdf8;transform:scale(1.1);}

.card-actions{
  position:absolute;top:8px;right:8px;
  display:flex;gap:5px;opacity:0;
}
.card:hover .card-actions{opacity:1;}

.icon-btn{width:28px;height:28px;border:none;border-radius:8px;background:#0008;color:white;cursor:pointer;}

.logo-box{height:90px;display:flex;align-items:center;justify-content:center;}
.logo-box img{max-width:100%;max-height:100%;}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.75);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-box{
  background:linear-gradient(145deg,#1e293b,#020617);
  padding:30px;
  border-radius:20px;
  width:420px;
  display:flex;
  flex-direction:column;
  gap:14px;
  align-items:stretch;
}
.modal-logo{width:90px;margin:auto;}

.modal-box input,
.modal-box select{
  width:100%;
  background:#020617;
  color:white;
  border:1px solid #334155;
  padding:12px;
  border-radius:12px;
  box-sizing:border-box;
}

/* LINKS INPUT */
.links-container{display:flex;flex-direction:column;gap:8px;}
.link-row{display:flex;gap:8px;align-items:center;}
.link-row input{flex:1;}
.link-row button{width:40px;height:40px;border-radius:10px;border:none;background:#334155;color:white;cursor:pointer;}

/* BOTONES */
.add-link-btn{background:#334155;border:none;padding:12px;border-radius:10px;cursor:pointer;}
.modal-buttons{display:flex;gap:10px;}
.btn-primary{flex:1;background:#0ea5e9;border:none;padding:12px;border-radius:10px;color:white;}
.btn-secondary{flex:1;background:#334155;border:none;padding:12px;border-radius:10px;color:white;}

/* POPUP OVERLAY */
.links-popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.links-box{
  background:linear-gradient(180deg,#020617,#020617);
  padding:40px 30px;
  border-radius:25px;
  display:flex;
  flex-direction:column;
  gap:14px;
  min-width:320px;
  max-width:400px;
  width:90%;
  align-items:stretch;
}
.popup-logo{
  width:140px;
  margin:auto;
  margin-bottom:10px;
}

/* BOTONES LINKS */
.link-btn{
  display:flex;
  align-items:center;
  gap:14px;
  background:#334155;
  padding:16px;
  border-radius:16px;
  text-decoration:none;
  color:white;
  font-family:'Orbitron';
  font-size:15px;
  transition:0.2s;
  width:100%;
  box-sizing:border-box;
  border:none;
  cursor:pointer;
  margin-bottom:10px;
}
.link-btn:hover{background:#475569;transform:scale(1.03);}
.link-btn img{width:26px;height:26px;}

/* BOTÓN CERRAR */
.btn-close{
  margin-top:10px;
  background:#334155;
  border:none;
  padding:16px;
  border-radius:16px;
  color:white;
  cursor:pointer;
  font-family:'Orbitron';
  width:100%;
  text-align:center;
  font-size:16px;
  transition:0.2s;
}
.btn-close:hover{background:#475569;}

/* TOAST */
#toast{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#020617;
  padding:20px;
  border-radius:15px;
  font-family:'Orbitron';
  display:none;
}

/* CONFIRM MODAL */
.confirm-modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
.confirm-box{
  background:linear-gradient(145deg,#1e293b,#020617);
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  display:flex;
  flex-direction:column;
  gap:20px;
}
.confirm-box p{font-family:'Orbitron';font-size:16px;}
.confirm-buttons{display:flex;gap:10px;}

/* FOOTER */
.footer{text-align:center;padding:20px;font-size:12px;color:#64748b;}
</style>
</head>

<body>

<div class="header-wrapper">
  <div class="banner"></div>
  <div class="main-title">ROMDOCK</div>
</div>

<div class="search-container">
  <input id="searchInput" placeholder="🔍 Buscar..." oninput="filter()">
</div>

<div id="app"></div>

<div id="popup" class="links-popup" onclick="outsideClick(event)">
  <div class="links-box">
    <img id="popupLogo" class="popup-logo" src="img/default.png">
    <div id="popupLinks"></div>
    <button class="btn-close" onclick="closePopup()">Cerrar</button>
  </div>
</div>

<div class="footer">© pokidj</div>

<script>
let data = {};

fetch("./data.json", { cache: "no-store" })
  .then(r => {
    if (!r.ok) throw new Error("No se pudo cargar data.json");
    return r.json();
  })
  .then(j => {
    data = j;
    render();
  })
  .catch(err => {
    console.error("ERROR cargando JSON:", err);
    document.getElementById("app").innerHTML = "<h2 style='padding:20px'>Error cargando datos</h2>";
  });

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  Object.keys(data).forEach(section => {
    let html = `<div class="section" data-section="${section}">
      <div class="section-title">
        <img src="img/${section}.png" onerror="this.src='img/default.png'">
        ${section}
      </div>
      <div class="row">`;

    data[section].forEach(item => {
      html += `<div class="card" onclick="openLinks('${section}','${item.name}')">
        <div class="logo-box">
          <img src="${encodeURI(item.img)}" onerror="this.src='img/default.png'">
        </div>
        <h3>${item.name}</h3>
      </div>`;
    });

    html += "</div></div>";
    app.innerHTML += html;
  });
}

function getDomainName(url){
  try{
    const u = new URL(url);
    return u.hostname.replace("www.","").split(".")[0];
  }catch{return url;}
}

function getFavicon(url){
  try{
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?sz=64&domain=${u.hostname}`;
  }catch{return "";}
}

function openLinks(section, name){
  const item = data[section].find(i => i.name === name);
  const links = item.links || [item.url];

  if(links.length === 1){ window.open(links[0]); return; }

  document.getElementById("popupLogo").src = encodeURI(item.img) || "img/default.png";

  const box = document.getElementById("popupLinks");
  box.innerHTML = "";

  links.forEach(l => {
    const b = document.createElement("button");
    b.className = "link-btn";

    const icon = document.createElement("img");
    icon.src = getFavicon(l);

    const text = document.createElement("span");
    text.textContent = "🌐 " + getDomainName(l);

    b.appendChild(icon);
    b.appendChild(text);
    b.onclick = () => window.open(l);
    box.appendChild(b);
  });

  document.getElementById("popup").style.display = "flex";
}

function closePopup(){ document.getElementById("popup").style.display = "none"; }
function outsideClick(e){ if(e.target.id === "popup") closePopup(); }

function filter(){
  const val = document.getElementById("searchInput").value.toLowerCase();

  document.querySelectorAll(".section").forEach(section => {
    let visible = 0;
    const cat = section.dataset.section.toLowerCase();

    section.querySelectorAll(".card").forEach(card => {
      const text = card.innerText.toLowerCase();
      if(text.includes(val) || cat.includes(val)){
        card.style.display = "flex";
        visible++;
      } else {
        card.style.display = "none";
      }
    });

    section.style.display = visible ? "block" : "none";
  });
}
</script>

</body>
</html>
