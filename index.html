<!DOCTYPE html>
<html lang="es">
<head>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Biblioteca de ROMs</title>

<style>
body {font-family:'Segoe UI'; background:#0f172a; color:white; margin:0;}
header {text-align:center; padding:20px; background:#020617; font-size:30px;}

.search-container {display:flex; justify-content:center; padding:15px;}
#searchInput {
  width:320px; max-width:80%;
  padding:12px; border-radius:12px;
  border:1px solid #334155;
  background:#020617; color:white;
  outline:none; transition:0.2s;
}
#searchInput:focus {
  border-color:#38bdf8;
  box-shadow:0 0 10px rgba(56,189,248,0.4);
}

/* autocomplete */
#suggestions {
  position:absolute;
  background:#020617;
  border:1px solid #334155;
  border-radius:10px;
  width:320px;
  max-width:80%;
  margin-top:5px;
  z-index:10;
}
.suggestion {
  padding:8px;
  cursor:pointer;
}
.suggestion:hover {background:#334155;}

.section {margin:30px 0; transition:0.3s;}
.section-title {
  font-size:22px; margin:20px;
  border-bottom:2px solid #444;
  display:flex; align-items:center; gap:10px;
}
.section-title img{width:24px;height:24px;}

.row {display:flex; overflow-x:auto; padding:20px; gap:15px;}

.card {
  width:220px; height:220px;
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  transition: transform .2s, box-shadow .2s, opacity .3s;
}

.card.hidden {
  opacity:0;
  transform:scale(0.9);
  pointer-events:none;
}

.card:hover {
  transform:scale(1.08);
  box-shadow:0 10px 25px rgba(0,0,0,.5);
}

.logo-box {height:90px; display:flex; align-items:center; justify-content:center;}
.logo-box img {max-width:100%; max-height:100%; object-fit:contain;}

.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  width:320px;
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
}

#popupLinks {width:100%; display:flex; flex-direction:column; gap:10px;}

.link-btn {
  width:100%;
  background:#334155;
  border:none;
  padding:10px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.link-btn:hover {background:#475569;}

.btn-close {
  width:100%;
  background:linear-gradient(145deg,#334155,#1e293b);
  border:none;
  padding:10px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.main-title{
  text-align:center;
  padding:25px;
  background:#020617;
  font-size:42px;
  font-weight:800;
  letter-spacing:2px;
  font-family:'Orbitron', sans-serif;
}

.search-container{
  display:flex;
  justify-content:flex-start;
  padding:15px 30px;
}

#searchInput{
  border:none;
  border-radius:12px;
  border:1px solid #334155;
}

.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#64748b;
}
</style>
</head>

<body>

<header class="main-title">ROMDOCK</header>

<div class="search-container">
  <div>
    <input type="text" id="searchInput" placeholder="🔍 Buscar consola o categoría..." oninput="filterConsoles(); showSuggestions()">
    <div id="suggestions"></div>
  </div>
</div>

<div id="app"></div>

<div id="linksPopup" class="modal">
  <div class="modal-box">
    <img id="popupLogo" src="img/default.png" style="width:70px;">
    <h2 id="popupTitle"></h2>
    <div id="popupLinks"></div>
    <button class="btn-close" onclick="closePopup()">Cerrar</button>
  </div>
</div>

<script>
let data = {};

fetch("data.json")
  .then(res => res.json())
  .then(json => { data = json; render(); });

function render(){
  const app = document.getElementById("app");
  app.innerHTML="";
  Object.keys(data).forEach(section=>{
    let html = `<div class="section">
      <div class="section-title">
        <img src="img/${section}.png" onerror="this.src='img/default.png'">
        ${section}
      </div>
      <div class="row">`;

    data[section].forEach(item=>{
      html += `<div class="card" onclick="openLinks('${section}','${item.name}')">
        <div class="logo-box">
          <img src="${item.img}" onerror="this.src='img/default.png'">
        </div>
        <h3>${item.name}</h3>
      </div>`;
    });

    html += "</div></div>";
    app.innerHTML += html;
  });
}

function filterConsoles(){
  const search = document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".section").forEach(section=>{
    let visible = 0;
    const category = section.querySelector(".section-title").textContent.toLowerCase();

    section.querySelectorAll(".card").forEach(card=>{
      const name = card.querySelector("h3").textContent.toLowerCase();

      if(name.includes(search) || category.includes(search)){
        card.classList.remove("hidden");
        visible++;
      } else {
        card.classList.add("hidden");
      }
    });

    section.style.display = visible ? "block" : "none";
  });
}

function showSuggestions(){
  const input = document.getElementById("searchInput").value.toLowerCase();
  const box = document.getElementById("suggestions");
  box.innerHTML="";

  if(!input) return;

  const suggestions = new Set();

  Object.keys(data).forEach(section=>{
    if(section.toLowerCase().includes(input)) suggestions.add(section);

    data[section].forEach(item=>{
      if(item.name.toLowerCase().includes(input)) suggestions.add(item.name);
    });
  });

  suggestions.forEach(s=>{
    const div = document.createElement("div");
    div.className="suggestion";
    div.textContent=s;
    div.onclick=()=>{
      document.getElementById("searchInput").value=s;
      box.innerHTML="";
      filterConsoles();
    };
    box.appendChild(div);
  });
}

function openLinks(section,name){
  const item = data[section].find(i=>i.name===name);
  let links = item.links ? item.links : (item.url ? [item.url] : []);

  if(links.length===1){ window.open(links[0],"_blank"); return; }

  const container=document.getElementById("popupLinks");
  container.innerHTML="";
  document.getElementById("popupTitle").textContent=name;
  document.getElementById("popupLogo").src=item.img;

  links.forEach(link=>{
    const btn=document.createElement("button");
    btn.className="link-btn";
    btn.textContent=link;
    btn.onclick=()=>window.open(link,"_blank");
    container.appendChild(btn);
  });

  document.getElementById("linksPopup").style.display="flex";
}

function closePopup(){
  document.getElementById("linksPopup").style.display="none";
}
</script>


<div class="footer">© pokidj</div>
</body>
</html>
